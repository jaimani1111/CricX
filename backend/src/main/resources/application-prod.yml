spring:
  application:
    name: crickx-backend

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/crickx}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:crickx-super-secret-key-that-should-be-changed-in-production-2024-min-256-bits}
  expiration: ${JWT_EXPIRATION:86400000}

# Resend Email Integration (disabled for now)
resend:
  api:
    key: ${RESEND_API_KEY:disabled}

# CORS
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost}

# Logging
logging:
  level:
    com.crickx: INFO
    org.springframework.data.mongodb: WARN
